<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>跳绳跟练计时器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#0F6E56;
  --blue:#378ADD;--blue-l:#E6F1FB;
  --coral:#D85A30;--coral-l:#FAECE7;
  --gray:#888780;--gray-l:#F5F5F2;--gray-d:#444441;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --border:#e8e6e0;--bg:#fff;--bg2:#F8F7F4;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

#home{padding:20px 16px 32px;gap:20px}
.logo-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.logo-icon{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round}
.logo-text{font-size:17px;font-weight:600;color:var(--text)}
.logo-sub{font-size:12px;color:var(--text3);margin-top:1px}
.card{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px}
.card-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px}
textarea{width:100%;border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:14px;color:var(--text);background:var(--bg2);resize:none;outline:none;font-family:inherit;line-height:1.6}
textarea:focus{border-color:var(--green)}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:60px}
.row input[type=number]{flex:1;border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;color:var(--text);background:var(--bg2);outline:none;font-family:inherit}
.row input:focus{border-color:var(--green)}
.row select{flex:1;border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;color:var(--text);background:var(--bg2);outline:none;font-family:inherit;appearance:none}
.big-btn{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.3px;transition:opacity .15s}
.big-btn:active{opacity:.85}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.preset-chip{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);font-size:12px;color:var(--text2);background:var(--bg);cursor:pointer;transition:all .15s;white-space:nowrap}
.preset-chip:active,.preset-chip.sel{background:var(--green-l);border-color:var(--green);color:var(--green-d);font-weight:500}
.status-msg{font-size:13px;color:var(--text3);text-align:center;padding:8px 0;min-height:22px}
.status-msg.err{color:var(--coral)}

#timer{background:var(--bg2)}
.timer-header{display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
.back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.back-btn svg{width:16px;height:16px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.timer-title{font-size:15px;font-weight:500;flex:1}
.progress-info{font-size:12px;color:var(--text3)}
.timer-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px;gap:14px}
.phase-badge{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500}
.action-name{font-size:26px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;min-height:64px;display:flex;align-items:center;justify-content:center}
.tip-text{font-size:13px;color:var(--text3);text-align:center;line-height:1.6;min-height:52px;padding:0 8px}
.ring-wrap{position:relative;width:200px;height:200px}
.ring-wrap svg{width:200px;height:200px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--gray-l);stroke-width:10}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s linear,stroke .3s}
.ring-center{position:absolute;top:0;left:0;width:200px;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.ring-time{font-size:52px;font-weight:700;color:var(--text);line-height:1}
.ring-label{font-size:12px;color:var(--text3)}
.next-up{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:12px 16px;width:100%;display:flex;align-items:center;gap:10px}
.next-label{font-size:11px;color:var(--text3);white-space:nowrap}
.next-name{font-size:13px;color:var(--text);font-weight:500;flex:1}
.next-dur{font-size:12px;color:var(--text3)}
.ctrl-row{display:flex;gap:12px;width:100%;justify-content:center;padding-bottom:4px}
.ctrl-btn{width:56px;height:56px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.ctrl-btn:active{background:var(--gray-l)}
.ctrl-btn.primary{width:72px;height:72px;background:var(--green);border-color:var(--green)}
.ctrl-btn.primary:active{opacity:.85}
.ctrl-btn svg{width:22px;height:22px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ctrl-btn.primary svg{stroke:#fff}
.steps-scroll{width:100%;overflow-x:auto;padding-bottom:4px}
.steps-row{display:flex;gap:6px;padding:0 2px;width:max-content}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-l);border:0.5px solid var(--border);flex-shrink:0;transition:background .2s}
.step-dot.done{background:var(--green-d)}
.step-dot.cur{background:var(--green);transform:scale(1.4)}
.step-dot.rest{background:var(--blue-l)}
.bpm-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.bpm-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-l);transition:background .1s}
.bpm-dot.beat{background:var(--green)}

#done{align-items:center;justify-content:center;padding:32px 20px;gap:20px;text-align:center}
.done-icon{width:72px;height:72px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center}
.done-icon svg{width:36px;height:36px;fill:none;stroke:var(--green);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.done-title{font-size:22px;font-weight:700;color:var(--text)}
.done-sub{font-size:14px;color:var(--text2);line-height:1.6}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px}
.stat-card{background:var(--bg);border-radius:var(--radius-sm);border:0.5px solid var(--border);padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--green)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>

<div class="screen active" id="home">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.5"/><path d="M12 7.5v6M9 10l3 3.5 3-3.5"/><path d="M5 12c0 0 2-3 7-3s7 3 7 3"/></svg>
    </div>
    <div>
      <div class="logo-text">跳绳跟练计时器</div>
      <div class="logo-sub">输入训练计划，自动生成语音计时</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">快速选择预设计划</div>
    <div class="preset-row">
      <div class="preset-chip" onclick="loadPreset(0)">第1–2周 基础</div>
      <div class="preset-chip" onclick="loadPreset(1)">第3–5周 专项</div>
      <div class="preset-chip" onclick="loadPreset(2)">第6–8周 强化</div>
    </div>
    <div class="card-title">或输入自定义计划</div>
    <textarea id="planInput" rows="5" placeholder="例如：
双脚跳 60秒，休息30秒，重复3组
单脚跳 45秒，休息30秒，重复2组
高抬腿跳 30秒，休息30秒，重复3组"></textarea>
  </div>

  <div class="card">
    <div class="card-title">个人信息（用于热量计算）</div>
    <div class="row"><label>体重</label><input type="number" id="weight" placeholder="请输入体重" min="30" max="150"><span style="font-size:13px;color:var(--text3);margin-left:4px">kg</span></div>
    <div class="row"><label>语音提示</label>
      <select id="voiceMode">
        <option value="full">完整提示（动作名+鼓励）</option>
        <option value="action">仅动作名</option>
        <option value="count">仅倒计时</option>
        <option value="off">关闭语音</option>
      </select>
    </div>
    <div class="row"><label>节拍声</label>
      <select id="beatMode">
        <option value="on">开启</option>
        <option value="off">关闭</option>
      </select>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>
  <button class="big-btn" onclick="startWorkout()">生成计时器并开始</button>
</div>

<div class="screen" id="timer">
  <div class="timer-header">
    <div class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="timer-title" id="timerTitle">训练中</div>
    <div class="progress-info" id="progressInfo">1 / 1</div>
  </div>

  <div class="timer-main">
    <div class="phase-badge" id="phaseBadge">准备</div>
    <div class="action-name" id="actionName">准备开始</div>

    <div class="ring-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="ringTime">0</div>
        <div class="ring-label">秒</div>
      </div>
    </div>

    <div class="bpm-row">
      <div class="bpm-dot" id="bpmDot"></div>
      <button onclick="adjustBpm(-5)" style="width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0">−</button>
      <span id="bpmLabel" style="min-width:64px;text-align:center;font-size:13px;font-weight:500;color:var(--text)">— BPM</span>
      <button onclick="adjustBpm(5)" style="width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0">+</button>
    </div>

    <div class="tip-text" id="tipText"></div>

    <div class="next-up">
      <div class="next-label">下一个</div>
      <div class="next-name" id="nextName">—</div>
      <div class="next-dur" id="nextDur"></div>
    </div>

    <div class="ctrl-row">
      <div class="ctrl-btn" onclick="prevStep()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="ctrl-btn primary" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      </div>
      <div class="ctrl-btn" onclick="nextStep()">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <div class="steps-scroll"><div class="steps-row" id="stepsRow"></div></div>
  </div>
</div>

<div class="screen" id="done">
  <div class="done-icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="done-title">训练完成！</div>
  <div class="done-sub" id="doneSub">今天表现很棒，继续保持！</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="statTime">0</div><div class="stat-lbl">训练时长（分钟）</div></div>
    <div class="stat-card"><div class="stat-val" id="statKcal">0</div><div class="stat-lbl">消耗热量（千卡）</div></div>
    <div class="stat-card"><div class="stat-val" id="statSets">0</div><div class="stat-lbl">完成组数</div></div>
    <div class="stat-card"><div class="stat-val" id="statSteps">0</div><div class="stat-lbl">估算跳绳次数</div></div>
  </div>
  <button class="big-btn" onclick="goHome()" style="max-width:300px;width:100%">返回首页</button>
</div>

<script>
const PRESETS = [
  {
    bpm: 70,
    text: `双脚跳 60秒，休息30秒，重复3组
左右交替跳 45秒，休息30秒，重复2组
高抬腿跳 20秒，休息30秒，重复2组`
  },
  {
    bpm: 110,
    text: `开合跳 45秒，休息30秒，重复4组
单脚跳强化 60秒，休息30秒，重复2组
高频小步跳 20秒，休息20秒，重复4组`
  },
  {
    bpm: 140,
    text: `全力跳 20秒，休息10秒，重复8组
开合跳 45秒，休息30秒，重复3组
快速双脚跳 45秒，休息30秒，重复5组`
  }
];

const PHASE_BPM = [70, 110, 140];

const VOICE_CUES = {
  '双脚跳': [
    '双脚跳开始！两脚并拢，前脚掌着地，加油！',
    '保持节奏，跟着节拍跳，你做得很好！',
    '核心收紧，手腕轻松甩绳，继续！',
  ],
  '左右交替跳': [
    '左右交替跳！每次绳过换脚，保持平衡！',
    '很好！支撑脚前脚掌发力，节奏稳住！',
    '交替换脚，感受脚踝的弹性，加油！',
  ],
  '高抬腿跳': [
    '高抬腿跳！膝盖抬到腰部高度，冲！',
    '落地时膝盖弯曲缓冲，上身保持直立！',
    '感受腿部爆发力，你很棒，继续！',
  ],
  '开合跳': [
    '开合跳开始！跳起时脚向两侧打开，落地并拢！',
    '保持节拍，重心居中，脚踝稳定！',
    '侧向移步就靠这个！节奏感很重要，加油！',
  ],
  '单脚跳': [
    '单脚跳！前脚掌着地，脚踝保持稳定！',
    '很好！不要锁膝，保持弹性！',
    '单脚平衡练起来，羽毛球落步更稳！',
  ],
  '单脚跳强化': [
    '单脚跳强化！感受每一跳的爆发力！',
    '脚踝稳定，膝盖微弯，你在进步！',
    '左右脚交替，控制好重心，继续冲！',
  ],
  '高频小步跳': [
    '高频小步跳！脚踝发力弹地，频率优先！',
    '步幅要小，频率要快，像在球场垫步一样！',
    '全力冲刺！你的步伐会越来越快的！',
  ],
  '快速双脚跳': [
    '快速双脚跳！保持节奏，手腕发力！',
    '核心收紧，感受速度！你太厉害了！',
    '跟着节拍全力跳，这就是冠军的节奏！',
  ],
  '全力跳': [
    '全力冲刺！这是最高强度，拼了！',
    '坚持住！每一秒都在突破自己！',
    '快要结束了，最后冲刺，加油加油！',
  ],
  '六点步伐': [
    '六点步伐！想象球的落点，快速移步！',
    '步伐要轻，启动要快，这就是球场节奏！',
    '很好！跳绳练出来的步伐就该这样！',
  ],
};

const REST_CUES = [
  '休息一下，放松呼吸，为下一组做准备！',
  '深呼吸，调整节奏，你表现得很好！',
  '短暂休息，保持专注，马上继续！',
  '呼气放松，下一组你一定更棒！',
];

const ENCOURAGE_HALFWAY = [
  '已经完成一半了，继续保持！',
  '过半了！你的状态很好，冲！',
  '坚持就是胜利，还有一半加油！',
];

let steps = [], curIdx = 0, timeLeft = 0, playing = false, ticker = null;
let beatCtx = null, beatScheduler = null, nextBeatTime = 0, currentBpm = 70;
let startTime = null, presetBpm = 70, halfSpoken = false;

function loadPreset(i) {
  document.getElementById('planInput').value = PRESETS[i].text;
  presetBpm = PRESETS[i].bpm;
  document.querySelectorAll('.preset-chip').forEach((c, j) => c.classList.toggle('sel', j === i));
}

function parsePlan(text) {
  const steps = [];
  const lines = text.trim().split('\n').filter(l => l.trim());
  for (const line of lines) {
    const l = line.trim();
    if (!l) continue;
    const durMatches = l.match(/(\d+)\s*秒/g);
    const repMatch = l.match(/重复\s*(\d+)\s*[组次]/);
    const reps = repMatch ? parseInt(repMatch[1]) : 1;
    let name = l.split(/\d+秒/)[0].replace(/，.*$/, '').replace(/,.*$/, '').trim();
    name = name.replace(/^[，,\s]+|[，,\s]+$/g, '').trim() || '训练';

    if (durMatches && durMatches.length >= 2) {
      const workSec = parseInt(durMatches[0]);
      const restSec = parseInt(durMatches[1]);
      for (let r = 0; r < reps; r++) {
        steps.push({ name, dur: workSec, type: '训练', set: r + 1, totalSets: reps });
        steps.push({ name: '休息', dur: restSec, type: '休息', set: r + 1, totalSets: reps });
      }
    } else if (durMatches && durMatches.length === 1) {
      const workSec = parseInt(durMatches[0]);
      for (let r = 0; r < reps; r++) {
        steps.push({ name, dur: workSec, type: '训练', set: r + 1, totalSets: reps });
      }
    }
  }
  return steps;
}

function startWorkout() {
  const text = document.getElementById('planInput').value.trim();
  if (!text) { showStatus('请输入训练计划或选择预设', 'err'); return; }
  const parsed = parsePlan(text);
  if (!parsed.length) { showStatus('无法解析训练计划，请检查格式', 'err'); return; }

  steps = [{ name: '准备开始', dur: 10, type: '准备' }].concat(parsed);
  curIdx = 0; playing = true; halfSpoken = false;
  startTime = Date.now();

  showScreen('timer');
  buildDots();
  loadStep(0);
  startTick();
  if (document.getElementById('beatMode').value === 'on') initBeat();
}

function loadStep(idx) {
  if (idx >= steps.length) { finishWorkout(); return; }
  const s = steps[idx];
  timeLeft = s.dur;

  document.getElementById('actionName').textContent =
    s.type === '训练' && s.totalSets > 1
      ? `${s.name}  ${s.set}/${s.totalSets}`
      : s.name;

  document.getElementById('ringTime').textContent = s.dur;
  const badge = document.getElementById('phaseBadge');
  badge.textContent = s.type;
  const colors = { 训练: '#E1F5EE:#0F6E56', 休息: '#E6F1FB:#185FA5', 准备: '#F5F5F2:#5F5E5A' };
  const [bg, col] = (colors[s.type] || colors['训练']).split(':');
  badge.style.cssText = `background:${bg};color:${col}`;

  updateRing(s.dur, s.dur, s.type);
  updateProgress();
  updateNext();
  updateDots();
  speakStep(s);

  const bpm = s.type === '训练' ? presetBpm : (s.type === '休息' ? Math.round(presetBpm * 0.5) : 60);
  setCurrentBpm(bpm);
  if (s.type === '休息') stopBeat();
  else if (document.getElementById('beatMode').value === 'on') resumeBeat();
}

function speakStep(s) {
  const mode = document.getElementById('voiceMode').value;
  if (!window.speechSynthesis || mode === 'off' || mode === 'count') return;
  window.speechSynthesis.cancel();
  let text = '';

  if (mode === 'action') {
    if (s.type === '准备') text = '准备开始';
    else if (s.type === '休息') text = '休息';
    else text = s.totalSets > 1 ? `第${s.set}组，${s.name}` : s.name;
  } else {
    if (s.type === '准备') text = '准备开始，做好热身，我们出发！';
    else if (s.type === '休息') {
      text = REST_CUES[Math.floor(Math.random() * REST_CUES.length)];
    } else {
      const cues = VOICE_CUES[s.name];
      if (cues) {
        const idx2 = (s.set - 1) % cues.length;
        text = cues[idx2];
      } else {
        text = `${s.name}，开始！加油！`;
      }
      if (s.totalSets > 1) text = `第${s.set}组，` + text;
    }
  }
  utterThis(text);
}

function utterThis(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.95; u.pitch = 1.05; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang.startsWith('zh'));
  if (zh) u.voice = zh;
  window.speechSynthesis.speak(u);
}

function speakCount(n) {
  const mode = document.getElementById('voiceMode').value;
  if (!window.speechSynthesis || mode === 'off' || mode === 'action') return;
  window.speechSynthesis.cancel();
  utterThis(String(n));
}

function startTick() {
  clearInterval(ticker);
  ticker = setInterval(() => {
    if (!playing) return;
    timeLeft--;
    document.getElementById('ringTime').textContent = timeLeft;
    updateRing(timeLeft, steps[curIdx].dur, steps[curIdx].type);

    const totalSteps = steps.length;
    if (!halfSpoken && curIdx >= Math.floor(totalSteps / 2)) {
      halfSpoken = true;
      setTimeout(() => {
        const msg = ENCOURAGE_HALFWAY[Math.floor(Math.random() * ENCOURAGE_HALFWAY.length)];
        utterThis(msg);
      }, 500);
    }

    if (timeLeft <= 3 && timeLeft > 0) speakCount(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(ticker);
      curIdx++;
      if (curIdx < steps.length) { loadStep(curIdx); startTick(); }
      else finishWorkout();
    }
  }, 1000);
}

function togglePlay() {
  playing = !playing;
  const icon = document.getElementById('playIcon');
  if (playing) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
    startTick();
    if (document.getElementById('beatMode').value === 'on' && steps[curIdx]?.type === '训练') resumeBeat();
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    clearInterval(ticker);
    stopBeat();
  }
}

function prevStep() { clearInterval(ticker); curIdx = Math.max(0, curIdx - 1); loadStep(curIdx); if (playing) startTick(); }
function nextStep() { clearInterval(ticker); curIdx++; if (curIdx < steps.length) { loadStep(curIdx); if (playing) startTick(); } else finishWorkout(); }

function updateProgress() {
  document.getElementById('progressInfo').textContent = `${curIdx + 1} / ${steps.length}`;
}

function updateNext() {
  const next = steps[curIdx + 1];
  if (next) {
    document.getElementById('nextName').textContent = next.name + (next.totalSets > 1 ? ` (${next.set}/${next.totalSets}组)` : '');
    document.getElementById('nextDur').textContent = next.dur + '秒';
  } else {
    document.getElementById('nextName').textContent = '全部完成！';
    document.getElementById('nextDur').textContent = '';
  }
}

function updateRing(left, total, type) {
  const circ = 553;
  const pct = total > 0 ? left / total : 0;
  const fg = document.getElementById('ringFg');
  fg.style.strokeDashoffset = circ * (1 - pct);
  fg.style.stroke = type === '训练' ? '#1D9E75' : type === '休息' ? '#378ADD' : '#888780';
}

function buildDots() {
  const row = document.getElementById('stepsRow');
  row.innerHTML = '';
  steps.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (s.type === '休息' ? ' rest' : '');
    d.id = 'dot' + i;
    row.appendChild(d);
  });
}

function updateDots() {
  steps.forEach((_, i) => {
    const d = document.getElementById('dot' + i);
    if (!d) return;
    d.classList.remove('done', 'cur');
    if (i < curIdx) d.classList.add('done');
    else if (i === curIdx) d.classList.add('cur');
  });
}

function finishWorkout() {
  clearInterval(ticker); stopBeat();
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  const mins = Math.max(1, Math.round(elapsed / 60));
  const weight = parseFloat(document.getElementById('weight').value) || 60;
  const kcal = Math.round(weight * 0.14 * mins);
  const trainSteps = steps.filter(s => s.type === '训练');
  const trainSets = trainSteps.length;
  const estimatedJumps = trainSteps.reduce((sum, s) => sum + Math.round(presetBpm * s.dur / 60), 0);
  document.getElementById('statTime').textContent = mins;
  document.getElementById('statKcal').textContent = kcal;
  document.getElementById('statSets').textContent = trainSets;
  document.getElementById('statSteps').textContent = estimatedJumps;
  document.getElementById('doneSub').textContent = `消耗约 ${kcal} 千卡，估算跳绳 ${estimatedJumps} 次，你太棒了！`;
  setTimeout(() => utterThis('训练完成！你今天的表现非常出色，继续保持这个状态！'), 300);
  showScreen('done');
}

function goHome() {
  clearInterval(ticker); stopBeat(); playing = false;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg; el.className = 'status-msg' + (type ? ' ' + type : '');
  setTimeout(() => el.textContent = '', 3000);
}

if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function setCurrentBpm(bpm) {
  currentBpm = bpm;
  document.getElementById('bpmLabel').textContent = bpm + ' BPM';
}

function adjustBpm(delta) {
  const newBpm = Math.min(200, Math.max(40, currentBpm + delta));
  presetBpm = newBpm;
  setCurrentBpm(newBpm);
  if (playing && steps[curIdx]?.type === '训练' && document.getElementById('beatMode').value === 'on') {
    resumeBeat();
  }
}

function initBeat() {
  if (!beatCtx) {
    try { beatCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  }
  if (beatCtx.state === 'suspended') beatCtx.resume();
  scheduleBeat();
}

function resumeBeat() {
  stopBeat();
  if (!beatCtx) { initBeat(); return; }
  if (beatCtx.state === 'suspended') beatCtx.resume();
  scheduleBeat();
}

function scheduleBeat() {
  if (!beatCtx) return;
  nextBeatTime = beatCtx.currentTime;
  function loop() {
    if (!playing || document.getElementById('beatMode').value === 'off') return;
    if (steps[curIdx]?.type !== '训练') return;
    while (nextBeatTime < beatCtx.currentTime + 0.1) {
      playClick(nextBeatTime);
      flashBpmDot();
      nextBeatTime += 60 / currentBpm;
    }
    beatScheduler = setTimeout(loop, 25);
  }
  loop();
}

function stopBeat() {
  clearTimeout(beatScheduler);
}

function playClick(time) {
  if (!beatCtx) return;
  const o = beatCtx.createOscillator();
  const g = beatCtx.createGain();
  o.connect(g); g.connect(beatCtx.destination);
  o.type = 'sine';
  o.frequency.value = 900;
  g.gain.setValueAtTime(0.12, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
  o.start(time); o.stop(time + 0.05);
}

let bpmFlashTimer = null;
function flashBpmDot() {
  const dot = document.getElementById('bpmDot');
  dot.classList.add('beat');
  clearTimeout(bpmFlashTimer);
  bpmFlashTimer = setTimeout(() => dot.classList.remove('beat'), 80);
}

document.getElementById('planInput').addEventListener('input', () => {
  document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('sel'));
  presetBpm = 100;
});
</script>
